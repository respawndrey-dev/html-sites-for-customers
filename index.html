<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow-Up Generator</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f5f7fa; padding: 20px; }
    .wrap { max-width: 900px; margin: 40px auto; background:white; padding:24px; border-radius:8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { margin-bottom: 16px; color: #1B3139; }
    input, textarea { width:100%; margin-bottom:12px; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing: border-box; }
    textarea { height: 80px; resize: vertical; }
    button { padding:12px 16px; background:#1B3139; color:white; border:none; border-radius:6px; cursor:pointer; font-weight: bold; width: 100%; }
    button:hover { background: #2c4d58; }
    iframe { width:100%; height:500px; border:1px solid #ddd; margin-top:20px; border-radius: 6px; background: white; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Client Follow-Up Generator</h1>

    <input id="client" placeholder="Client Name">
    <input id="date" placeholder="Date (e.g., Oct 24, 2023)">
    <textarea id="summary" placeholder="Executive Summary"></textarea>
    <textarea id="insights" placeholder="Key Insights (Put each point on a new line)"></textarea>
    <textarea id="next" placeholder="Next Steps (Put each point on a new line)"></textarea>

    <button onclick="generate()">Generate Page</button>

    <iframe id="preview"></iframe>
  </div>

  <script>
    function generate() {
      // Get values from the inputs
      const client = document.getElementById('client').value;
      const date = document.getElementById('date').value;
      const summary = document.getElementById('summary').value;
      
      // Turn lines of text into bullet points
      const insights = document.getElementById('insights').value.split('\n').filter(line => line.trim() !== '').map(i => `<li>${i}</li>`).join('');
      const next = document.getElementById('next').value.split('\n').filter(line => line.trim() !== '').map(i => `<li>${i}</li>`).join('');

      // Create the internal HTML for the preview
      const htmlOutput = `
        <html>
        <head>
          <style>
            body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding:30px; color: #333; line-height: 1.6; }
            h1 { color:#1B3139; border-bottom: 2px solid #1B3139; padding-bottom: 10px; }
            .date { color: #666; font-style: italic; margin-bottom: 30px; }
            .card { border:1px solid #eee; padding:20px; border-radius:8px; background: #fafafa; margin-bottom:20px; }
            h2, h3 { color: #1B3139; }
            ul { padding-left: 20px; }
            li { margin-bottom: 8px; }
          </style>
        </head>
        <body>
          <h1>${client || 'Client'} Follow-Up</h1>
          <div class="date">${date || 'No Date Provided'}</div>

          <div class="card">
            <h2>Executive Summary</h2>
            <p>${summary || 'No summary provided.'}</p>
          </div>

          <h3>Key Insights</h3>
          <ul>${insights || '<li>No insights provided.</li>'}</ul>

          <h3>Next Steps</h3>
          <ul>${next || '<li>No next steps provided.</li>'}</ul>
        </body>
        </html>`;

      // Inject the generated HTML into the iframe
      const preview = document.getElementById('preview');
      preview.srcdoc = htmlOutput;
    }
  </script>
</body>
</html>
